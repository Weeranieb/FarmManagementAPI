components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Type "Bearer" followed by a space and JWT token in Authorization header.
    CookieAuth:
      type: apiKey
      in: cookie
      name: jwt_token
      description: JWT stored in HTTP-only cookie (sent automatically by browser).

  schemas:
    SuccessResponse:
      type: object
      properties:
        result:
          type: boolean
          example: true
        data:
          description: Response payload (object or array)
      required:
        - result

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: '100001'
        message:
          type: string
          example: 'User already exists'
      required:
        - code
        - message

    RegisterRequest:
      type: object
      required: [clientId, username, password, firstName]
      properties:
        clientId:
          type: integer
        username:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        userLevel:
          type: integer
        contactNumber:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean

    CreateClientRequest:
      type: object
      required: [name, ownerName, contactNumber]
      properties:
        name:
          type: string
        ownerName:
          type: string
        contactNumber:
          type: string

    UpdateClientRequest:
      type: object
      required: [id]
      properties:
        id:
          type: integer
        name:
          type: string
        ownerName:
          type: string
        contactNumber:
          type: string
        isActive:
          type: boolean

    CreateUserRequest:
      type: object
      required: [username, password, firstName]
      properties:
        username:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        userLevel:
          type: integer
        contactNumber:
          type: string
        clientId:
          type: integer

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        userLevel:
          type: integer
        contactNumber:
          type: string

    CreateFarmRequest:
      type: object
      required: [clientId, name]
      properties:
        clientId:
          type: integer
        name:
          type: string

    UpdateFarmBody:
      type: object
      properties:
        name:
          type: string

    CreatePondsRequest:
      type: object
      required: [farmId, names]
      properties:
        farmId:
          type: integer
        names:
          type: array
          items:
            type: string
          minItems: 1

    UpdatePondBody:
      type: object
      properties:
        farmId:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [active, maintenance]

    CreateWorkerRequest:
      type: object
      required: [farmGroupId, firstName, nationality, salary]
      properties:
        farmGroupId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        contactNumber:
          type: string
        nationality:
          type: string
        salary:
          type: number
          format: double
        hireDate:
          type: string
          format: date-time

    UpdateWorkerRequest:
      type: object
      required: [id]
      properties:
        id:
          type: integer
        farmGroupId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        contactNumber:
          type: string
        nationality:
          type: string
        salary:
          type: number
          format: double
        hireDate:
          type: string
          format: date-time
        isActive:
          type: boolean

    CreateMerchantRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        contactNumber:
          type: string
        location:
          type: string

    UpdateMerchantRequest:
      type: object
      required: [id]
      properties:
        id:
          type: integer
        name:
          type: string
        contactNumber:
          type: string
        location:
          type: string

    CreateFeedPriceHistoryItemRequest:
      type: object
      required: [price, priceUpdatedDate]
      properties:
        price:
          type: number
          format: double
        priceUpdatedDate:
          type: string
          format: date-time

    CreateFeedCollectionRequest:
      type: object
      required: [name, unit]
      properties:
        name:
          type: string
        unit:
          type: string
        feedPriceHistories:
          type: array
          items:
            $ref: '#/components/schemas/CreateFeedPriceHistoryItemRequest'

    UpdateFeedCollectionRequest:
      type: object
      required: [id]
      properties:
        id:
          type: integer
        name:
          type: string
        unit:
          type: string

    CreateFeedPriceHistoryRequest:
      type: object
      required: [feedCollectionId, price, priceUpdatedDate]
      properties:
        feedCollectionId:
          type: integer
        price:
          type: number
          format: double
        priceUpdatedDate:
          type: string
          format: date-time

    UpdateFeedPriceHistoryRequest:
      type: object
      required: [id]
      properties:
        id:
          type: integer
        feedCollectionId:
          type: integer
        price:
          type: number
          format: double
        priceUpdatedDate:
          type: string
          format: date-time

    PondFillRequest:
      type: object
      required: [fishType, amount, activityDate]
      properties:
        fishType:
          type: string
          description: Fish type (e.g. from fish type constants)
        amount:
          type: integer
          description: Number of fish
        fishWeight:
          type: number
          format: double
        fishUnit:
          type: string
        pricePerUnit:
          type: number
          format: double
        activityDate:
          type: string
          format: date

    PondMoveRequest:
      type: object
      required: [toPondId, fishType, amount, activityDate]
      properties:
        toPondId:
          type: integer
          description: Destination pond id; backend resolves or creates active_pond for it
        fishType:
          type: string
        amount:
          type: integer
        fishWeight:
          type: number
          format: double
        activityDate:
          type: string
          format: date

    PondSellDetailItem:
      type: object
      properties:
        fishType:
          type: string
        size:
          type: string
        amount:
          type: number
          format: double
        fishUnit:
          type: string
        pricePerUnit:
          type: number
          format: double

    PondSellRequest:
      type: object
      required: [activityDate]
      properties:
        activityDate:
          type: string
          format: date
        details:
          type: array
          items:
            $ref: '#/components/schemas/PondSellDetailItem'
          description: Per-species sell lines
        merchantId:
          type: integer
          nullable: true
        markToClose:
          type: boolean
          description: If true, close active pond after transaction and set pond to maintenance
        additionalCosts:
          type: array
          items:
            type: object
            required: [title, cost]
            properties:
              title:
                type: string
              cost:
                type: number
                format: double
          description: Optional extra costs (e.g. transport, packaging)

    DropdownItem:
      type: object
      properties:
        key:
          type: integer
        value:
          type: string
