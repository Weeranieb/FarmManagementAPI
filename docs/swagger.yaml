basePath: /api/v1
definitions:
  dto.AdditionalCostItem:
    properties:
      cost:
        type: number
      title:
        type: string
    required:
    - cost
    - title
    type: object
  dto.CreateClientRequest:
    properties:
      contactNumber:
        type: string
      name:
        type: string
      ownerName:
        type: string
    required:
    - contactNumber
    - name
    - ownerName
    type: object
  dto.CreateFarmRequest:
    properties:
      clientId:
        type: integer
      name:
        type: string
    required:
    - clientId
    - name
    type: object
  dto.CreateFeedCollectionRequest:
    properties:
      clientId:
        description: when JWT has no clientId (e.g. super admin), required for create
        type: integer
      fcr:
        type: number
      feedPriceHistories:
        items:
          $ref: '#/definitions/dto.CreateFeedPriceHistoryItemRequest'
        type: array
      feedType:
        enum:
        - fresh
        - pellet
        type: string
      name:
        type: string
      unit:
        type: string
    required:
    - name
    - unit
    type: object
  dto.CreateFeedPriceHistoryItemRequest:
    properties:
      price:
        type: number
      priceUpdatedDate:
        type: string
    required:
    - price
    - priceUpdatedDate
    type: object
  dto.CreateMerchantRequest:
    properties:
      contactNumber:
        type: string
      location:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.CreatePondsRequest:
    properties:
      farmId:
        type: integer
      names:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - farmId
    - names
    type: object
  dto.CreateUserRequest:
    properties:
      clientId:
        type: integer
      contactNumber:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        type: string
      userLevel:
        type: integer
      username:
        type: string
    required:
    - firstName
    - password
    - username
    type: object
  dto.DailyLogBulkUpsertRequest:
    properties:
      entries:
        items:
          $ref: '#/definitions/dto.DailyLogEntryInput'
        minItems: 1
        type: array
      freshFeedCollectionId:
        type: integer
      month:
        description: YYYY-MM
        type: string
      pelletFeedCollectionId:
        type: integer
    required:
    - entries
    - month
    type: object
  dto.DailyLogEntryInput:
    properties:
      day:
        maximum: 31
        minimum: 1
        type: integer
      deathFishCount:
        minimum: 0
        type: integer
      freshEvening:
        type: number
      freshMorning:
        type: number
      pelletEvening:
        type: number
      pelletMorning:
        type: number
      touristCatchCount:
        minimum: 0
        type: integer
    required:
    - day
    type: object
  dto.DailyLogEntryResponse:
    properties:
      day:
        type: integer
      deathFishCount:
        type: integer
      freshEvening:
        type: number
      freshMorning:
        type: number
      freshUnitPrice:
        type: number
      id:
        type: integer
      pelletEvening:
        type: number
      pelletMorning:
        type: number
      pelletUnitPrice:
        type: number
      touristCatchCount:
        type: integer
    type: object
  dto.DailyLogExcelUploadResponse:
    properties:
      rowsImported:
        type: integer
      savedPath:
        type: string
    type: object
  dto.DailyLogMonthResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/dto.DailyLogEntryResponse'
        type: array
      freshFeedCollectionId:
        type: integer
      freshFeedCollectionName:
        type: string
      freshUnit:
        type: string
      pelletFeedCollectionId:
        type: integer
      pelletFeedCollectionName:
        type: string
      pelletUnit:
        type: string
    type: object
  dto.DailyLogTemplateImportResponse:
    properties:
      results:
        items:
          $ref: '#/definitions/dto.DailyLogTemplateImportResult'
        type: array
      skipped:
        items:
          type: string
        type: array
    type: object
  dto.DailyLogTemplateImportResult:
    properties:
      pondId:
        type: integer
      pondName:
        type: string
      rowsImported:
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      rememberMe:
        type: boolean
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.PondFillRequest:
    properties:
      activityDate:
        type: string
      additionalCosts:
        items:
          $ref: '#/definitions/dto.AdditionalCostItem'
        type: array
      amount:
        minimum: 1
        type: integer
      fishType:
        type: string
      fishWeight:
        type: number
      pricePerUnit:
        type: number
      remark:
        type: string
    required:
    - activityDate
    - amount
    - fishType
    - pricePerUnit
    type: object
  dto.PondMoveRequest:
    properties:
      activityDate:
        type: string
      additionalCosts:
        items:
          $ref: '#/definitions/dto.AdditionalCostItem'
        type: array
      amount:
        minimum: 1
        type: integer
      fishType:
        type: string
      fishWeight:
        type: number
      markToClose:
        type: boolean
      pricePerUnit:
        type: number
      remark:
        type: string
      toPondId:
        type: integer
    required:
    - activityDate
    - amount
    - fishType
    - pricePerUnit
    - toPondId
    type: object
  dto.PondSellDetailItem:
    properties:
      fishCount:
        type: integer
      fishSizeGradeId:
        type: integer
      pricePerUnit:
        type: number
      weight:
        type: number
    required:
    - fishSizeGradeId
    - pricePerUnit
    - weight
    type: object
  dto.PondSellRequest:
    properties:
      activityDate:
        type: string
      additionalCosts:
        items:
          $ref: '#/definitions/dto.AdditionalCostItem'
        type: array
      details:
        items:
          $ref: '#/definitions/dto.PondSellDetailItem'
        minItems: 1
        type: array
      markToClose:
        type: boolean
      merchantId:
        type: integer
    required:
    - activityDate
    - details
    type: object
  dto.RegisterRequest:
    properties:
      clientId:
        type: integer
      contactNumber:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        type: string
      userLevel:
        type: integer
      username:
        type: string
    required:
    - clientId
    - firstName
    - password
    - username
    type: object
  dto.UpdateFarmBody:
    properties:
      name:
        type: string
    type: object
  dto.UpdateMerchantRequest:
    properties:
      contactNumber:
        type: string
      id:
        type: integer
      location:
        type: string
      name:
        type: string
    required:
    - id
    type: object
  dto.UpdatePondBody:
    properties:
      farmId:
        type: integer
      name:
        type: string
      status:
        enum:
        - active
        - maintenance
        type: string
    type: object
  http.ErrorResponseModel:
    properties:
      code:
        example: "100001"
        type: string
      message:
        example: User already exists
        type: string
    type: object
  http.ResponseModel:
    properties:
      data: {}
      error: {}
      result:
        type: boolean
    type: object
  model.Client:
    properties:
      contactNumber:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      isTouristFishingEnabled:
        type: boolean
      name:
        type: string
      ownerName:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  model.FeedCollection:
    properties:
      clientId:
        type: integer
      created_at:
        type: string
      created_by:
        type: string
      fcr:
        type: number
      feedType:
        type: string
      id:
        type: integer
      name:
        type: string
      unit:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  model.User:
    properties:
      clientId:
        type: integer
      contactNumber:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      firstName:
        type: string
      id:
        type: integer
      lastName:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
      userLevel:
        type: integer
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A Boonma Farm application with Fiber, GORM, and Dependency Injection
  title: Boonma Farm API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login user with provided credentials and return JWT token. Token
        is also set as HTTP-only cookie.
      parameters:
      - description: Login data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user and clear the authentication cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Logout user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with the provided details
      parameters:
      - description: User data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Register a new user
      tags:
      - auth
  /client:
    post:
      consumes:
      - application/json
      description: Add a new client with the provided details. Only super admin can
        create clients.
      parameters:
      - description: Client data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Add a new client
      tags:
      - client
    put:
      consumes:
      - application/json
      description: Update details of a client. Super admin can update any client,
        others can only update their own client.
      parameters:
      - description: Client data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.Client'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Update client
      tags:
      - client
  /client/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a client by its ID. Super admin can access any client,
        others can only access their own client.
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get a client by ID
      tags:
      - client
  /client/list:
    get:
      consumes:
      - application/json
      description: Returns a list of clients with id and name for dropdown/select.
        Only super admin can access.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get client list for dropdown
      tags:
      - client
  /farm:
    get:
      consumes:
      - application/json
      description: Retrieve a list of farms associated with the current client
      parameters:
      - description: Client ID
        in: query
        name: clientId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get list of farms
      tags:
      - farm
    post:
      consumes:
      - application/json
      description: Add a new farm entry with the provided details. Super admin only.
      parameters:
      - description: Farm data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateFarmRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Add a new farm entry
      tags:
      - farm
  /farm/{farmId}/daily-logs/import-template:
    post:
      parameters:
      - description: Farm ID
        in: path
        name: farmId
        required: true
        type: integer
      - collectionFormat: csv
        description: Pond IDs to import
        in: formData
        items:
          type: integer
        name: selectedPondIds
        required: true
        type: array
      - description: xlsx file
        in: formData
        name: file
        required: true
        type: file
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/http.ResponseModel'
            - properties:
                data:
                  $ref: '#/definitions/dto.DailyLogTemplateImportResponse'
              type: object
      summary: Upload multi-pond Excel template and import daily logs
      tags:
      - farm
  /farm/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve details of a specific farm by its ID
      parameters:
      - description: Farm ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get farm by ID
      tags:
      - farm
    put:
      consumes:
      - application/json
      description: Update details of a farm entry. Super admin only. Id in path; body
        contains name.
      parameters:
      - description: Farm ID
        in: path
        name: id
        required: true
        type: integer
      - description: Farm data (name)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateFarmBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Update farm entry
      tags:
      - farm
  /farm/hierarchy:
    get:
      consumes:
      - application/json
      description: Retrieve all farms for the client with their nested ponds (for
        Existing Data view). Super admin may pass clientId query param.
      parameters:
      - description: Client ID (optional for super admin)
        in: query
        name: clientId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get farm hierarchy with ponds
      tags:
      - farm
  /feed-collection:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of feed collections for the current client
      parameters:
      - description: Page number
        in: query
        name: page
        required: true
        type: integer
      - description: Page size
        in: query
        name: pageSize
        required: true
        type: integer
      - description: Order by field
        in: query
        name: orderBy
        type: string
      - description: Search keyword
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Get a list of feed collections with pagination
      tags:
      - feed-collection
    post:
      consumes:
      - application/json
      description: Add a new feed collection with the provided details
      parameters:
      - description: Feed collection data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateFeedCollectionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Add a new feed collection
      tags:
      - feed-collection
    put:
      consumes:
      - application/json
      description: Update an existing feed collection with new details
      parameters:
      - description: Updated feed collection data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.FeedCollection'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Update a feed collection
      tags:
      - feed-collection
  /feed-collection/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a feed collection by its ID
      parameters:
      - description: Feed collection ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Get a feed collection by ID
      tags:
      - feed-collection
  /fish-size-grade/dropdown:
    get:
      description: Returns dropdown items for fish size grades sorted by sort_index
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get fish size grade dropdown
      tags:
      - fish-size-grade
  /merchant:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all merchants
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Get list of merchants
      tags:
      - merchant
    post:
      consumes:
      - application/json
      description: Create a new merchant with the provided details
      parameters:
      - description: Merchant data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateMerchantRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
