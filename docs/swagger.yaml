      summary: Add a new farm entry
      tags:
      - farm
    put:
      consumes:
      - application/json
      description: Update details of a farm entry
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Farm data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.Farm'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Update farm entry
      tags:
      - farm
  /farm/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve details of a specific farm by its ID
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Farm ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
