      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
