securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
  CookieAuth:
    description: JWT token stored in HTTP-only cookie (automatically sent by browser)
    in: cookie
    name: jwt_token
    type: apiKey
