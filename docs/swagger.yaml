basePath: /api/v1
definitions:
  dto.CreateClientRequest:
    properties:
      contactNumber:
        type: string
      name:
        type: string
      ownerName:
        type: string
    required:
    - contactNumber
    - name
    - ownerName
    type: object
  dto.CreateFarmRequest:
    properties:
      clientId:
        type: integer
      code:
        type: string
      name:
        type: string
    required:
    - clientId
    - code
    - name
    type: object
  dto.CreateFeedCollectionRequest:
    properties:
      code:
        type: string
      feedPriceHistories:
        items:
          $ref: '#/definitions/dto.CreateFeedPriceHistoryItemRequest'
        type: array
      name:
        type: string
      unit:
        type: string
    required:
    - code
    - name
    - unit
    type: object
  dto.CreateFeedPriceHistoryItemRequest:
    properties:
      price:
        type: number
      priceUpdatedDate:
        type: string
    required:
    - price
    - priceUpdatedDate
    type: object
  dto.CreateMerchantRequest:
    properties:
      contactNumber:
        type: string
      location:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.CreatePondRequest:
    properties:
      code:
        type: string
      farmId:
        type: integer
      name:
        type: string
    required:
    - code
    - farmId
    - name
    type: object
  dto.CreateUserRequest:
    properties:
      clientId:
        type: integer
      contactNumber:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        type: string
      userLevel:
        type: integer
      username:
        type: string
    required:
    - firstName
    - password
    - username
    type: object
  dto.CreateWorkerRequest:
    properties:
      contactNumber:
        type: string
      farmGroupId:
        type: integer
      firstName:
        type: string
      hireDate:
        type: string
      lastName:
        type: string
      nationality:
        type: string
      salary:
        type: number
    required:
    - farmGroupId
    - firstName
    - nationality
    - salary
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.RegisterRequest:
    properties:
      clientId:
        type: integer
      contactNumber:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        type: string
      userLevel:
        type: integer
      username:
        type: string
    required:
    - clientId
    - firstName
    - password
    - username
    type: object
  http.ErrorResponseModel:
    properties:
      code:
        example: "100001"
        type: string
      message:
        example: User already exists
        type: string
    type: object
  http.ResponseModel:
    properties:
      data: {}
      error: {}
      result:
        type: boolean
    type: object
  model.Client:
    properties:
      contactNumber:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      name:
        type: string
      ownerName:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  model.Farm:
    properties:
      clientId:
        type: integer
      code:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  model.FeedCollection:
    properties:
      clientId:
        type: integer
      code:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: integer
      name:
        type: string
      unit:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  model.Merchant:
    properties:
      contactNumber:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: integer
      location:
        type: string
      name:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  model.Pond:
    properties:
      code:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      farmId:
        type: integer
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  model.User:
    properties:
      clientId:
        type: integer
      contactNumber:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      firstName:
        type: string
      id:
        type: integer
      lastName:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
      userLevel:
        type: integer
      username:
        type: string
    type: object
  model.Worker:
    properties:
      clientId:
        type: integer
      contactNumber:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      farmGroupId:
        type: integer
      firstName:
        type: string
      hireDate:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      lastName:
        type: string
      nationality:
        type: string
      salary:
        type: number
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A Boonma Farm application with Fiber, GORM, and Dependency Injection
  title: Boonma Farm API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login user with provided credentials and return JWT token
      parameters:
      - description: Login data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Login user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with the provided details
      parameters:
      - description: User data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Register a new user
      tags:
      - auth
  /client:
    post:
      consumes:
      - application/json
      description: Add a new client with the provided details. Only super admin can
        create clients.
      parameters:
      - description: Client data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Add a new client
      tags:
      - client
    put:
      consumes:
      - application/json
      description: Update details of a client. Super admin can update any client,
        others can only update their own client.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Client data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.Client'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      summary: Update client
      tags:
      - client
  /client/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a client by its ID. Super admin can access any client,
        others can only access their own client.
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Get a client by ID
      tags:
      - client
  /farm:
    get:
      consumes:
      - application/json
      description: Retrieve a list of farms associated with the current client
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
