services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: boonmafarm
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - boonmafarm_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d boonmafarm"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-mcp:
    build:
      context: .
      dockerfile: postgres-mcp.Dockerfile
    command: ["postgresql://user:password@postgres:5432/boonmafarm"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - mcp

volumes:
  boonmafarm_postgres_data: